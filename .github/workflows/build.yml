name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:  # Ручной запуск: Actions → Build & Release → Run workflow

permissions:
  contents: write

jobs:
  # На push в main — поднять версию и запушить. На push тега — только задать version.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.outputs.outputs.version }}
      should_build: ${{ steps.outputs.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Bump version or read tag
        id: outputs
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            OLD_VERSION=$(node -p "require('./package.json').version")
            npm version patch --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json
            if git diff --staged --quiet; then
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "version=$OLD_VERSION" >> $GITHUB_OUTPUT
            else
              git commit -m "chore: bump version to $VERSION [skip ci]"
              git push origin main
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "version=$VERSION" >> $GITHUB_OUTPUT
            fi
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build-mac:
    runs-on: macos-latest
    needs: [prepare]
    if: needs.prepare.outputs.should_build == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref == 'refs/heads/main' && 'main' || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Create bin directory
        run: mkdir -p bin/darwin

      - name: Build macOS
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          command: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove debug files
        run: rm -f dist/builder-debug.yml

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          retention-days: 5

  release:
    needs: [build-mac, prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref == 'refs/heads/main' && 'main' || github.ref }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: UnblockPro v${{ needs.prepare.outputs.version }}
          body: |
            ## UnblockPro v${{ needs.prepare.outputs.version }}
            
            ### Скачать
            
            | Платформа | Файл | Описание |
            |-----------|------|----------|
            | **macOS** Apple Silicon (M1/M2/M3/M4) | `UnblockPro-*-mac-arm64.zip` | Для Mac с M-процессором |
            | **macOS** Intel | `UnblockPro-*-mac-x64.zip` | Для Mac с Intel |
            
            ### macOS — первый запуск
            
            После скачивания выполните в Терминале:
            ```
            xattr -cr /Applications/UnblockPro.app
            ```
            
          draft: false
          prerelease: false
          files: |
            artifacts/mac/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
